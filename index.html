<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessie Math - 未來算力挑戰</title>

    <!-- ✅ LINE / FB 預覽用 -->

    <!-- ✅ 預覽圖片（把檔名換成你的主題圖，例如 g5-u6.png） -->
    <meta property="og:image" content="g5-u6.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1536">
    <meta property="og:image:alt" content="Jessie Math 遊戲封面">

    <!-- ✅ 有些平台會參考 -->
    <link rel="image_src" href="g5-u6.png">

    <!-- ✅ Twitter / X（可用同一張圖） -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Jessie Math - 未來算力挑戰">
    <meta name="twitter:description" content="© 2025–2026 Jessie Math 捷析老師. All rights reserved.">
    <meta name="twitter:image" content="g5-u6.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- 極簡未來主義風格定義 --- */
        :root {
            --primary-color: #0071e3; /* 科技藍 */
            --bg-color: #f5f5f7; /* 淺灰色背景 */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --header-height: 75px;
            --brand-yellow: #FFD700;
        }

        /* 全域重設 */
        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: "SF Pro Text", "Myriad Set Pro", "SF Pro Icons", "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: var(--header-height);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* --- Header: 懸浮玻璃質感 --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo {
            font-size: 1.4em;
            font-weight: 600;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 35px;
            height: 35px;
            margin-right: 12px;

            /* ✅ 品牌一致：黃色圈圈、透明底圖 */
            border-radius: 999px;
            border: 3px solid var(--brand-yellow);
            background: transparent;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons button {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #d2d2d7;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .nav-buttons button:hover {
            background-color: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }

        .nav-buttons .back-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: 500;
        }

        .nav-buttons .back-button:hover {
            background-color: #0077ed;
            transform: scale(1.05);
        }

        /* --- 主內容容器 --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 極簡卡片 */
        .card {
            background-color: white;
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 30px;
            border: 1px solid #f0f0f2;
        }

        h2 {
            font-size: 2.2em;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5em;
            letter-spacing: -1px;
        }

        h3 {
            font-size: 1.2em;
            color: var(--text-sub);
            font-weight: 500;
            margin-top: 30px;
            border: none;
            padding: 0;
        }

        /* 輸入框樣式 */
        input[type="text"], input[type="number"] {
            background-color: #f5f5f7;
            border: 2px solid transparent;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 1.1em;
            width: 100%;
            outline: none;
        }

        input:focus {
            background-color: white;
            border-color: var(--primary-color);
        }

        /* --- 關卡與難度按鈕 --- */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .level-button {
            background-color: #f5f5f7;
            color: var(--text-main);
            padding: 24px 15px;
            border-radius: 18px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .level-button:hover {
            background-color: #e8e8ed;
            transform: translateY(-2px);
        }

        .level-button.selected {
            background-color: white;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .difficulty-options {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .difficulty-options button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            background-color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .difficulty-options button.selected {
            background-color: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }

        .start-game-button {
            width: 100%;
            padding: 20px;
            margin-top: 40px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
        }

        .start-game-button:disabled {
            background-color: #e8e8ed;
            color: #a1a1a6;
            cursor: not-allowed;
        }

        /* --- 遊戲區 --- */
        #game-section h2 { text-align: center; }

        .game-info {
            background-color: #f5f5f7;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 12px;
        }

        #question {
            font-size: 3.5em;
            font-weight: 700;
            text-align: center;
            padding: 40px 0;
            margin: 20px 0;
            background: none;
            border: none;
            letter-spacing: -2px;
            word-break: break-word;
        }

        .answer-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #answer-input {
            max-width: 300px;
            text-align: center;
            font-size: 2em;
            height: 80px;
            border-radius: 20px;
        }

        #btn-submit-answer {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }

        /* ✅ 回饋訊息（新增：不影響其他版面） */
        #feedback {
            margin-top: 22px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1em;
            min-height: 1.6em;
        }

        /* 排行榜表格 */
        #leaderboard-section table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        #leaderboard-section th {
            text-align: left;
            padding: 15px;
            color: var(--text-sub);
            font-weight: 500;
            border-bottom: 1px solid #d2d2d7;
        }

        #leaderboard-section td {
            padding: 20px 15px;
            border-bottom: 1px solid #f5f5f7;
        }

        /* 暫停遮罩 */
        #pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Footer */
        footer{
            width:100%;
            padding: 0 20px 24px;
        }
        .footer-pill{
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display:flex;
            justify-content: space-between;
            align-items:center;
            padding: 14px 16px;
            gap: 14px;
        }
        .footer-left,.footer-right{
            display:flex;
            align-items:center;
            gap: 10px;
            min-width: 0;
        }
        .footer-dot{
            width:10px;height:10px;border-radius:99px;
            background: var(--primary-color);
            box-shadow: 0 6px 14px rgba(0,113,227,0.25);
            flex: 0 0 auto;
        }
        .footer-copy{
            color: var(--text-sub);
            font-size: 0.92em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 520px;
        }
        .footer-icon{
            width:28px;height:28px;border-radius: 10px;
            display:flex;align-items:center;justify-content:center;
            background: #f5f5f7;
            border: 1px solid #e8e8ed;
            color: var(--text-main);
            flex: 0 0 auto;
        }
        .footer-tagline{
            color: var(--text-main);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        /* ✅ RWD：平板 */
        @media (max-width: 900px) {
            header{ padding: 0 16px; }
            .container{ margin: 28px auto; }
            .card{ padding: 40px 28px; }
            #question{ font-size: 2.8em; padding: 28px 0; }
            .game-info{ flex-wrap: wrap; justify-content: center; }
        }

        /* ✅ RWD：手機 */
        @media (max-width: 600px) {
            .container { margin: 20px auto; }
            .card { padding: 30px 20px; }
            #question { font-size: 2.2em; }
            .nav-buttons button span { display: none; }
            .footer-pill{
                flex-direction: column;
                align-items: flex-start;
            }
            .footer-copy, .footer-tagline{
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="JESSIEMATH-Q.png" alt="Icon">
            <span>Jessie Math</span>
        </div>

        <!-- ✅ 右上角：首頁 → 遊戲大廳 → 回到五年級四則運算 -->
        <div class="nav-buttons">
            <button onclick="window.location.href='https://jessiemath0703-chu.github.io/website2/'">
                <i class="fas fa-home"></i>&nbsp;<span>首頁</span>
            </button>

            <button onclick="window.location.href='https://jessiemath0703-chu.github.io/Game-Lobby/'">
                <i class="fas fa-gamepad"></i>&nbsp;<span>遊戲大廳</span>
            </button>

            <button class="back-button" onclick="window.location.href='https://jessiemath0703-chu.github.io/Game-Lobby/#g5-u6'">
                <i class="fas fa-rotate-left"></i>&nbsp;<span>五年級四則運算</span>
            </button>
        </div>
    </header>

    <div class="container">
        <div id="name-input-section" class="card">
            <h2>四則運算挑戰。</h2>
            <p style="color: var(--text-sub); margin-bottom: 30px;">本模組旨在提升運算速度與精確度。請輸入暱稱開始。</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="player-name" placeholder="請輸入暱稱" maxlength="10">
                <button onclick="showSection('level-selection-section')" style="background: var(--text-main); color: white; border: none; padding: 0 30px; border-radius: 14px; cursor: pointer; white-space: nowrap;">進入選單</button>
            </div>
        </div>

        <div id="level-selection-section" class="card" style="display: none;">
            <h2>選擇關卡</h2>

            <div id="illustration-card-group" style="display: none; background: #f5f5f7; padding: 25px; border-radius: 20px; margin-bottom: 30px;">
                <h4 id="level-topic-display" style="margin:0 0 10px 0; color: var(--primary-color);"></h4>
                <div id="illustration-card">
                    <span id="card-text" style="color: var(--text-main);"></span>
                </div>
            </div>

            <h3>單元選單</h3>
            <div class="level-grid">
                <button class="level-button" data-level="1" data-topic="三步驟的併式與逐步求解">1 逐步求解</button>
                <button class="level-button" data-level="2" data-topic="分配律">2 分配律</button>
                <button class="level-button" data-level="3" data-topic="連除的計算">3 連除計算</button>
                <button class="level-button" data-level="4" data-topic="生活問題 (平均與應用)">4 平均問題</button>
                <button class="level-button" data-level="5" data-topic="生活問題 (百分應用/折扣)">5 生活應用</button>
            </div>

            <h3>運算難度</h3>
            <div class="difficulty-options">
                <button data-difficulty="easy">簡單</button>
                <button data-difficulty="medium">中等</button>
                <button data-difficulty="hard">困難</button>
            </div>

            <button class="start-game-button" id="btn-start-game" disabled>開始運算</button>

            <div id="leaderboard-section" style="margin-top: 60px;">
                <h2>最佳紀錄</h2>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>暱稱</th>
                            <th>分數</th>
                            <th>時間</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>

        <div id="game-section" class="card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h2>單元 <span id="current-level-display"></span></h2>
                <div id="combo-display" style="color: var(--primary-color); font-weight: 700; font-size: 1.2em;"></div>
            </div>

            <div class="game-info">
                <div style="text-align: center;"><small style="color: var(--text-sub);">剩餘時間</small><br><span id="time-display" style="font-size: 1.8em; font-weight: 700;">60</span></div>
                <div style="text-align: center;"><small style="color: var(--text-sub);">累積得分</small><br><span id="score-display" style="font-size: 1.8em; font-weight: 700;">0</span></div>
            </div>

            <div id="question">Loading...</div>

            <div class="answer-group">
                <input type="number" id="answer-input" placeholder="0" onkeypress="handleAnswerKey(event)">
                <div style="display: flex; gap: 15px;">
                    <button id="btn-pause" style="background: white; border: 1px solid #d2d2d7; padding: 15px 20px; border-radius: 12px; cursor: pointer;"><i class="fas fa-pause"></i></button>
                    <button id="btn-submit-answer" onclick="checkAnswer()">送出答案</button>
                </div>
            </div>

            <!-- ✅ 新增：正確/錯誤回饋（不改動原結構，只插入一行顯示區） -->
            <div id="feedback"></div>

            <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px;">
                <button id="btn-restart" style="background: none; border: none; color: var(--text-sub); cursor: pointer;"><i class="fas fa-sync-alt"></i> 重來</button>
                <button id="btn-menu" style="background: none; border: none; color: var(--text-sub); cursor: pointer;"><i class="fas fa-door-open"></i> 選單</button>
            </div>
        </div>

        <div id="game-result-section" class="card" style="display: none; text-align: center;">
            <h2 style="font-size: 3em;">計算結束。</h2>
            <div style="margin: 30px 0;">
                <p id="result-name" style="font-size: 1.2em; color: var(--text-sub);"></p>
                <div id="final-score" style="font-size: 5em; font-weight: 800; color: var(--primary-color); line-height: 1;">0</div>
                <div id="star-rating" style="font-size: 2em; margin-top: 10px;"></div>
            </div>
            <button class="start-game-button" onclick="showSection('level-selection-section')">再次挑戰</button>
        </div>
    </div>

    <div id="pause-overlay">
        <h2 style="letter-spacing: 5px;">暫停中</h2>
        <button onclick="pauseGame(false)" style="background: var(--text-main); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 1.1em;">繼續挑戰</button>
    </div>

    <!-- Footer（依你給的原樣加入） -->
    <footer>
        <div class="footer-pill">
            <div class="footer-left">
                <div class="footer-dot" aria-hidden="true"></div>
                <div class="footer-copy">© 2025–2026 Jessie Math 捷析老師. All rights reserved.</div>
            </div>
            <div class="footer-right">
                <div class="footer-icon" aria-hidden="true"><i class="fas fa-compass"></i></div>
                <div class="footer-tagline">數學不迷路，Jessie 帶你走向理解。</div>
            </div>
        </div>
    </footer>

<script>
    /* --- 邏輯保持不變 --- */
    let playerName = '';
    let currentLevel = 0;
    let currentDifficulty = '';
    let currentScore = 0;
    let timeLeft = 0;
    let combo = 0;
    let gameTimer = null;
    let isGameRunning = false;
    let currentAnswer = 0;
    let leaderboard = [];

    const MAX_TIME = 60;
    const SCORE_PER_QUESTION = 100;
    const TIME_CORRECTION = 5;
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function showSection(sectionId) {
        if (gameTimer) { clearInterval(gameTimer); gameTimer = null; isGameRunning = false; }
        const sections = ['name-input-section', 'level-selection-section', 'game-section', 'game-result-section'];
        sections.forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(sectionId).style.display = 'block';

        if (sectionId === 'level-selection-section') {
            const nameInput = document.getElementById('player-name').value.trim();
            if (nameInput) { playerName = nameInput; }
            else { showSection('name-input-section'); alert('請輸入暱稱！'); return; }
            renderLeaderboard();
        }
    }

    document.querySelectorAll('.level-button').forEach(button => {
        button.addEventListener('click', function() {
            document.querySelectorAll('.level-button').forEach(btn => btn.classList.remove('selected'));
            this.classList.add('selected');
            currentLevel = parseInt(this.dataset.level);
            updateStartButtonState();
            const topic = this.dataset.topic;
            document.getElementById('level-topic-display').textContent = topic;
            document.getElementById('card-text').textContent = getIllustrationCardText(currentLevel, topic);
            document.getElementById('illustration-card-group').style.display = 'block';
        });
    });

    document.querySelectorAll('.difficulty-options button').forEach(button => {
        button.addEventListener('click', function() {
            document.querySelectorAll('.difficulty-options button').forEach(btn => btn.classList.remove('selected'));
            this.classList.add('selected');
            currentDifficulty = this.dataset.difficulty;
            updateStartButtonState();
        });
    });

    document.getElementById('btn-start-game').addEventListener('click', () => {
        if (playerName && currentLevel > 0 && currentDifficulty) initializeGame();
    });

    function updateStartButtonState() {
        const hasLevel = document.querySelector('.level-button.selected');
        const hasDifficulty = document.querySelector('.difficulty-options button.selected');
        document.getElementById('btn-start-game').disabled = !(hasLevel && hasDifficulty);
    }

    function getIllustrationCardText(level, topic) {
        const texts = {
            1: "逐步計算序列：括號先行，先乘除後加減。",
            2: "分配律算法：尋求共同因子，簡化運算過程。",
            3: "連除規律：由左至右運算，或利用括號轉化。",
            4: "平均數據分析：總和與數量的平均分配關係。",
            5: "生活折扣運算：百分比、原價與售價的轉換關係。",
        };
        return texts[level] || "";
    }

    function generateQuestion(level, difficulty) {
        let maxVal = difficulty === 'easy' ? 10 : (difficulty === 'medium' ? 50 : 100);
        let expression, answer;
        switch(level) {
            case 1:
                let n1 = randInt(1, maxVal), n2 = randInt(1, maxVal), n3 = randInt(1, maxVal);
                if (Math.random() < 0.5) { expression = `${n1} + (${n2} × ${n3})`; answer = n1 + (n2 * n3); }
                else { let larger = randInt(n2+1, n2+maxVal); expression = `(${larger} - ${n2}) + ${n3}`; answer = (larger-n2)+n3; }
                break;
            case 2:
                let a = randInt(2, Math.floor(maxVal/5)), b = randInt(5, maxVal), c = randInt(5, maxVal);
                if (Math.random() < 0.5) { expression = `${a} × (${b} + ${c})`; answer = a*(b+c); }
                else { let lb = Math.max(b,c), sc = Math.min(b,c); expression = `${a}×${lb} - ${a}×${sc}`; answer = a*(lb-sc); }
                break;
            case 3:
                let d1 = randInt(2,5), d2 = randInt(2,5), q = randInt(5,15), o = q*d1*d2;
                if (Math.random() < 0.5) { expression = `${o} ÷ ${d1} ÷ ${d2}`; answer = q; }
                else { expression = `${o} ÷ (${d1} × ${d2})`; answer = q; }
                break;
            case 4:
                let num = randInt(2,4), sum = 0; for(let i=0;i<num;i++) sum += randInt(10, maxVal*2);
                let p = randInt(2,5); while(sum%p !== 0) sum++;
                expression = `總和為 ${sum}，共分成 ${p} 組，平均是多少？`;
                answer = sum/p;
                break;
            case 5:
                /* ✅ 修正題目語意：打「幾折」(6~9折) */
                let pr = randInt(10,50)*10, dr = randInt(1,4)*10, pct = 100-dr;   // pct: 60~90
                let fold = pct / 10;                                              // fold: 6~9
                expression = `${pr} 元的商品打 ${fold} 折後是多少元？`;
                answer = pr*(pct/100);
                break;
        }
        return { question: expression, answer: Math.round(answer) };
    }

    function initializeGame() {
        currentScore = 0; timeLeft = MAX_TIME; combo = 0; isGameRunning = false;
        document.getElementById('current-level-display').textContent = currentLevel;
        document.getElementById('score-display').textContent = currentScore;
        document.getElementById('time-display').textContent = timeLeft;
        document.getElementById('combo-display').textContent = '';
        const fb = document.getElementById('feedback'); if (fb) fb.textContent = '';   // ✅ 清空回饋
        showSection('game-section');
        nextQuestion();
        startGameTimer();
    }

    function startGameTimer() {
        if (isGameRunning || timeLeft <= 0) return;
        isGameRunning = true;
        gameTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('time-display').textContent = timeLeft;
            if (timeLeft <= 0) endGame(true);
        }, 1000);
    }

    function pauseGame(pause) {
        if (pause) { clearInterval(gameTimer); isGameRunning = false; document.getElementById('pause-overlay').style.display = 'flex'; }
        else { document.getElementById('pause-overlay').style.display = 'none'; startGameTimer(); document.getElementById('answer-input').focus(); }
    }

    function nextQuestion() {
        const q = generateQuestion(currentLevel, currentDifficulty);
        document.getElementById('question').textContent = q.question;
        currentAnswer = q.answer;
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    }

    function handleAnswerKey(e) { if (e.key === 'Enter' && isGameRunning) checkAnswer(); }

    /* ✅ 新增：回饋顯示（不改變流程，只把 alert 換成頁面回饋） */
    function showFeedback(isCorrect, correctAns) {
        const fb = document.getElementById('feedback');
        if (!fb) return;
        if (isCorrect) {
            fb.style.color = '#16a34a';
            fb.textContent = '正確！繼續衝～';
        } else {
            fb.style.color = '#dc2626';
            fb.textContent = `答錯了～正確答案是：${correctAns}`;
        }
        clearTimeout(showFeedback._t);
        showFeedback._t = setTimeout(() => { fb.textContent = ''; }, 900);
    }

    function checkAnswer() {
        if (!isGameRunning) return;
        const userAns = parseFloat(document.getElementById('answer-input').value.trim());
        if (isNaN(userAns)) return;

        if (userAns === currentAnswer) {
            combo++;
            currentScore += SCORE_PER_QUESTION * (1 + (combo - 1) * 0.2);
            timeLeft = Math.min(MAX_TIME * 2, timeLeft + TIME_CORRECTION);
            document.getElementById('score-display').textContent = Math.round(currentScore);
            document.getElementById('combo-display').textContent = `COMBO X${combo}`;
            showFeedback(true, currentAnswer);   // ✅ 正確回饋
            nextQuestion();
        } else {
            combo = 0; timeLeft -= TIME_CORRECTION;
            document.getElementById('combo-display').textContent = 'X';
            showFeedback(false, currentAnswer);  // ✅ 錯誤顯示正確答案
            if (timeLeft <= 0) endGame(true); else nextQuestion();
        }
    }

    function endGame(write) {
        clearInterval(gameTimer); isGameRunning = false;
        const final = Math.round(currentScore);
        document.getElementById('result-name').textContent = `運算者: ${playerName}`;
        document.getElementById('final-score').textContent = final;
        document.getElementById('star-rating').innerHTML = calculateStar(final);
        if (write) addToLeaderboard(playerName, currentLevel, currentDifficulty, final, MAX_TIME - timeLeft);
        showSection('game-result-section');
    }

    function calculateStar(s) {
        if (s >= 2000) return '● ● ●'; if (s >= 1000) return '● ● ○';
        if (s >= 500) return '● ○ ○'; return '○ ○ ○';
    }

    function addToLeaderboard(n, l, d, s, t) {
        leaderboard.push({ name: n, score: s, time: t });
        leaderboard.sort((a,b) => b.score - a.score || a.time - b.time);
        leaderboard = leaderboard.slice(0, 5);
        localStorage.setItem('mathLeaderboardFuture', JSON.stringify(leaderboard));
    }

    function renderLeaderboard() {
        const saved = localStorage.getItem('mathLeaderboardFuture');
        if (saved) leaderboard = JSON.parse(saved);
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = leaderboard.length ? '' : '<tr><td colspan="4" style="text-align:center;">暫無紀錄</td></tr>';
        leaderboard.forEach((e, i) => {
            const row = tbody.insertRow();
            row.innerHTML = `<td>${i+1}</td><td>${e.name}</td><td>${e.score}</td><td>${e.time}s</td>`;
        });
    }

    document.getElementById('btn-restart').addEventListener('click', () => confirm('確定重來？') && initializeGame());
    document.getElementById('btn-pause').addEventListener('click', () => pauseGame(isGameRunning));
    document.getElementById('btn-menu').addEventListener('click', () => confirm('返回選單？') && showSection('level-selection-section'));

    document.addEventListener('DOMContentLoaded', () => {
        showSection('name-input-section');
        document.getElementById('player-name').focus();
    });
</script>
